version: "3.8"

services:

  rabbitmq:
    image: rabbitmq:3.9-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./app/app:/app/app:rw
      - ./app/pyproject.toml:/app/pyproject.toml:ro
      - ./app/poetry.lock:/app/poetry.lock:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  price_consumer:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: price_consumer
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app/app:/app/app:rw
      - ./app/pyproject.toml:/app/pyproject.toml:ro
      - ./app/poetry.lock:/app/poetry.lock:ro
    command: python -m app.consumer

volumes:
  postgres_data:
